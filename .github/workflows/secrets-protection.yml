name: Secret Value Protector

on:
  workflow_dispatch: # This lets us trigger it manually using the button

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Attempt to Read Secret Safely
        env:
          # This pulls the hidden password from the vault and stores it as an environment variable
          MY_HIDDEN_VAL: ${{ secrets.MY_SUPER_SECRET_PASSWORD }}
        run: |
          echo "GitHub Actions automatically masks secrets to protect them."
          echo "If I try to print the password directly, GitHub replaces it with asterisks."
          echo "Watch what happens here: $MY_HIDDEN_VAL"
          
      - name: Verify Length of Secret
        env:
          MY_HIDDEN_VAL: ${{ secrets.MY_SUPER_SECRET_PASSWORD }}
        run: |
          # This counts the characters without displaying the actual text
          echo "The length of your password is ${#MY_HIDDEN_VAL} characters long."
