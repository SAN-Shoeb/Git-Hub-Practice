name: Automated Code Quality Scanner

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows us to run it manually too

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scanner Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Syntax Analyzer
        run: |
          # This command tells flake8 to check all Python files for critical syntax errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
